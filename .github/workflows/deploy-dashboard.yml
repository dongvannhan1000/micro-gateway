name: Deploy Dashboard to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'apps/dashboard-ui/**'
      - '.github/workflows/deploy-dashboard.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/dashboard-ui/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Monorepo Dependencies
        run: npm install

      - name: Build with @opennextjs/cloudflare
        working-directory: apps/dashboard-ui
        env:
          NEXT_PRIVATE_SKIP_BUILD_CACHE: true
        run: |
          npm install -g @opennextjs/cloudflare
          npx @opennextjs/cloudflare build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/dashboard-ui
          command: deploy
