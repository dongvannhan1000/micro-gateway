# Combined CI/CD Pipeline for Micro-Security Gateway
#
# Pipeline Flow: Test → Penetration Tests (optional) → Migrate → Deploy
#
# Execution Strategy:
# - Core tests run on all pushes and PRs to main/develop
# - Penetration tests run on main branch only (don't block deployment)
# - Database migrations only run on main branch if tests pass
# - Deployment only runs on main branch if tests AND migrations pass
#
# Jobs use 'needs' dependency to enforce strict ordering and fail-fast behavior
# This ensures we don't waste resources deploying broken code

name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  test:
    name: Core Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run core tests (CI/CD)
        working-directory: ./apps/gateway-api
        run: npm test

      - name: Generate coverage report
        working-directory: ./apps/gateway-api
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/gateway-api/coverage/coverage-final.json
          flags: gateway-api
          name: gateway-api-coverage
        continue-on-error: true

  penetration-tests:
    name: Penetration Tests (Security Audit)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run penetration tests
        working-directory: ./apps/gateway-api
        run: npm run test:pen
        continue-on-error: true  # Don't block on expected failures

      - name: Upload penetration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: penetration-test-results
          path: apps/gateway-api/test-results/
        continue-on-error: true

  migrate-db:
    name: Database Migrations
    needs: test  # Only runs if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        working-directory: apps/gateway-api
        run: npm ci

      - name: Apply Database Migrations
        working-directory: apps/gateway-api
        run: npx wrangler d1 migrations apply ms-gateway-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-gateway:
    name: Deploy Gateway API
    needs: [test, migrate-db]  # Only runs if tests AND migrations pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        working-directory: apps/gateway-api
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: apps/gateway-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
