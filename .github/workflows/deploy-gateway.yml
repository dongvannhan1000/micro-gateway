name: Deploy Gateway API to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'apps/gateway-api/**'
      - 'packages/db/**'
      - '.github/workflows/deploy-gateway.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/gateway-api/**'
      - 'packages/db/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/gateway-api/package-lock.json

      - name: Install Dependencies
        working-directory: apps/gateway-api
        run: npm ci

      - name: Run Unit Tests
        working-directory: apps/gateway-api
        run: npm run test

  deploy:
    name: Deploy Gateway
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/gateway-api/package-lock.json

      - name: Install Dependencies
        working-directory: apps/gateway-api
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
