name = "gateway-api"
main = "src/index.ts"
compatibility_date = "2024-03-10"

[[d1_databases]]
binding = "DB"
database_name = "ms-gateway-db"
database_id = "c41c1616-fc55-42c0-bbca-65c782da1342"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "736bbb8ca70144609f4c411ed9a414d4"

[vars]
ENVIRONMENT = "development"
SUPABASE_URL = "https://yyfwepdlvcubthmeldir.supabase.co"
# SUPABASE_JWT_SECRET will be added as a secret via wrangler secret put

# Cron Triggers
# Scheduled Tasks: https://developers.cloudflare.com/workers/configuration/cron-triggers/
[[triggers.crons]]
# Monthly usage reset: Runs at 00:00 UTC on the 1st day of every month
# Cron expression: 0 0 1 * *
schedule = "0 0 1 * *"
