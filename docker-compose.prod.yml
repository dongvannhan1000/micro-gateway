version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard-ui/Dockerfile.prod
    container_name: ms-gateway-dashboard-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Supabase configuration
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # Gateway API configuration
      # Note: Update this URL for your production Gateway endpoint
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-https://your-gateway.workers.dev}
      # App configuration
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Micro-Security Gateway}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://your-domain.com}
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Security: Read-only root filesystem
    read_only: true
    # Temporary filesystem for writable directories
    tmpfs:
      - /tmp
      - /app/.next/cache
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ms-gateway-network
    # Restart policy for production
    restart: unless-stopped
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ms-gateway-network:
    driver: bridge
